name: Terraform CI - Plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_PLAN_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        working-directory: infra
        run: |
          tflint --init
          tflint

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          quiet: true
          skip_check: CKV2_AWS_11,CKV2_AWS_28,CKV_AWS_91,CKV_AWS_158,CKV_AWS_184,CKV_AWS_150,CKV_AWS_382,CKV_AWS_260,CKV_AWS_130,CKV2_AWS_12,CKV2_AWS_5,CKV2_AWS_76

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -no-color

      - name: Plan Summary
        working-directory: infra
        if: always()
        run: |
          echo "## Terraform Plan 📋" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Plan ran on this PR. Review before merging." >> $GITHUB_STEP_SUMMARY